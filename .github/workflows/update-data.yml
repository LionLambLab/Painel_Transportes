name: Atualizar Dados ANP + Indicadores

on:
  schedule:
    - cron: '0 17 * * *'
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Executar coleta (modo automático)
        run: |
          WEEKDAY=$(date -u +%u)
          if [ "$WEEKDAY" = "1" ] || [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "🔄 Modo COMPLETO (ANP + BCB + Notícias)"
            python scripts/fetch_data.py --mode=full
          else
            echo "📰 Modo NOTÍCIAS apenas"
            python scripts/fetch_data.py --mode=news
          fi

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git diff --cached --quiet || git commit -m "🔄 $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push

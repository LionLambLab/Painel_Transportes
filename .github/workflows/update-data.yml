name: Atualizar Dados ANP + Indicadores

on:
  schedule:
    - cron: '0 17 * * *'      # Todo dia 14h BRT (notícias)
    - cron: '0 12 1,15 * *'   # Dia 1 e 15 de cada mês, 9h BRT (indicadores)
  workflow_dispatch:
    inputs:
      mode:
        description: 'Modo de execução'
        required: false
        default: 'full'
        type: choice
        options: [full, news, indicators]

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: pip install requests pandas

      - name: Detectar modo e executar coleta
        run: |
          WEEKDAY=$(date -u +%u)
          DAY=$(date -u +%d)
          EVENT="${{ github.event_name }}"
          MANUAL_MODE="${{ github.event.inputs.mode }}"

          if [ "$EVENT" = "workflow_dispatch" ]; then
            MODE="${MANUAL_MODE:-full}"
          elif [ "$DAY" = "01" ] || [ "$DAY" = "15" ]; then
            MODE="full"
          elif [ "$WEEKDAY" = "1" ]; then
            MODE="full"
          else
            MODE="news"
          fi

          echo "▶ Executando modo: $MODE"
          python scripts/fetch_data.py --mode=$MODE

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git diff --cached --quiet || git commit -m "🔄 $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push

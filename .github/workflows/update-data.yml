name: Atualizar Dados ANP + Indicadores

on:
  schedule:
    # Toda segunda-feira às 17:00 UTC = 14:00 BRT
    # ANP publica os dados toda segunda entre 12h e 15h
    - cron: '0 17 * * 1'
  workflow_dispatch:  # permite rodar manualmente pelo GitHub

jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write   # necessário para commitar o JSON gerado

    steps:
      - name: Checkout repositório
        uses: actions/checkout@v4

      - name: Configurar Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependências
        run: |
          pip install requests pandas

      - name: Executar script de coleta
        run: python scripts/fetch_data.py

      - name: Commitar dados atualizados
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/indicators.json
          git diff --cached --quiet || git commit -m "🔄 Dados atualizados automaticamente $(date -u '+%d/%m/%Y %H:%M UTC')"
          git push
